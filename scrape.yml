name: Tarrant County Lead Scraper

on:
  schedule:
    - cron: "0 7 * * *"      # 07:00 UTC = 02:00 CT daily
  workflow_dispatch:           # manual trigger from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Job 1: scrape + commit ──────────────────────────────────────────────────
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      # 3. Dependencies
      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml dbfread playwright

      # 4. Playwright browser
      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      # 5. Run scraper
      - name: Run scraper
        run: python scraper/fetch.py
        env:
          LOOKBACK_DAYS: "7"

      # 6. Upload debug artifacts (always, so we can inspect on failure)
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: data/debug/
          retention-days: 3
          if-no-files-found: ignore

      # 7. Commit results back to repo
      - name: Commit records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/leads_ghl.csv || true
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  # ── Job 2: deploy dashboard to GitHub Pages ─────────────────────────────────
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main      # pick up the freshly-committed records

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
